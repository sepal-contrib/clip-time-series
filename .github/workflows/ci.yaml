name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  EARTHENGINE_TOKEN: ${{ secrets.EARTHENGINE_TOKEN }}
  PLANET_API_KEY: ${{ secrets.PLANET_API_KEY }}

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: mamba-org/setup-micromamba@v2
        with:
          environment-file: sepal_environment.yml
          cache-environment: false

      - name: Simulate patched conda recipe (remove conda ee-api, install fork)
        shell: micromamba-shell {0}
        run: |
          echo "=== Before ==="
          pip show earthengine-api | head -3
          pip install --no-deps --force-reinstall "git+https://github.com/openforis/earthengine-api.git@v1.1.5rc0#egg=earthengine-api&subdirectory=python"
          echo "=== After ==="
          pip show earthengine-api | head -3

      - name: Install test deps
        shell: micromamba-shell {0}
        run: pip install pytest nbmake ipykernel

      - name: Register kernel
        shell: micromamba-shell {0}
        run: python -m ipykernel install --user --name=test-kernel

      - name: Test UI notebook
        shell: micromamba-shell {0}
        run: pytest --nbmake ui.ipynb --nbmake-timeout=600 --nbmake-kernel=test-kernel
